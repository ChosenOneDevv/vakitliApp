name: vakitli
description: "Namaz vakitlerini takip eden, İslami yaşamı kolaylaştıran mobil uygulama."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.2
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  flutter_local_notifications: ^18.0.1
  flutter_timezone: ^3.0.1
  timezone: ^0.10.0
  share_plus: ^10.1.4
  flutter_compass: ^0.8.0
  home_widget: ^0.9.3
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  url_launcher: ^6.3.2
  camera: ^0.12.0+1
  dynamic_color: ^1.8.1
  just_audio: ^0.9.42
  audio_session: ^0.1.21
  firebase_core: ^3.13.0
  firebase_auth: ^5.6.0
  cloud_firestore: ^5.6.0
  firebase_storage: ^12.4.0
  google_sign_in: ^6.2.2
  geofencing_api: ^2.0.0
  flutter_pdfview: ^1.4.0
  path_provider: ^2.1.5
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  remove_alpha_ios: true
  background_color_ios: "#FFF8E1"
  adaptive_icon_background: "#FFF8E1"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/data/
    - assets/images/
    - assets/sounds/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-var.ttf
