name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Bağımlılıklar
        run: flutter pub get

      - name: Statik analiz
        run: flutter analyze

      - name: Testler
        run: flutter test
